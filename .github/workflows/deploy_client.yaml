name: Deploy Client

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-client
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Prepare standalone deployment
        run: |
          # Copy static files to standalone folder
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Setup SSH (decode base64)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_B64 }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync upload to temp dir
        run: |
          rsync -az --delete --progress \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            --rsync-path="mkdir -p /var/www/mixfood/client_new && rsync" \
            .next/standalone/ root@${{ secrets.VPS_HOST }}:/var/www/mixfood/client_new/

      - name: Atomic swap and restart
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes root@${{ secrets.VPS_HOST }} << 'EOF'
            set -euo pipefail

            # Load nvm and use Node 22
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 22

            TARGET="/var/www/mixfood/client"
            NEW="/var/www/mixfood/client_new"
            OLD="/var/www/mixfood/client_old"

            mkdir -p "$TARGET"
            rm -rf "$OLD"
            mv "$TARGET" "$OLD" || true
            mv "$NEW" "$TARGET"

            # Restart the Next.js server with PM2
            cd "$TARGET"
            pm2 delete mixfood || true
            RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" pm2 start server.js --name mixfood
            pm2 save
          EOF
